name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/api, apps/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=${{ matrix.workspace }}
      - run: npm run typecheck --workspace=${{ matrix.workspace }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/api, apps/web]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dummy_password
          POSTGRES_DB: portfolio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=${{ matrix.workspace }}
        continue-on-error: ${{ matrix.workspace == 'apps/web' }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        workspace: [apps/api, apps/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=${{ matrix.workspace }}

  prisma:
    name: Prisma Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dummy_password
          POSTGRES_DB: portfolio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:validate --workspace=apps/api
      - run: npm run prisma:generate --workspace=apps/api
      - run: npm run prisma:migrate:deploy --workspace=apps/api
        continue-on-error: true
