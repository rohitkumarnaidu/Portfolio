name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  quality:
    name: Quality Gate (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/api, apps/web]
      fail-fast: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dummy_password
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.workspace }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: ${{ matrix.workspace }}

      - name: Prisma validate & generate (api)
        if: matrix.workspace == 'apps/api'
        run: |
          npx prisma validate
          npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:dummy_password@localhost:5432/portfolio_test?schema=public

      - name: Prisma migrate (api)
        if: matrix.workspace == 'apps/api'
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:dummy_password@localhost:5432/portfolio_test?schema=public

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: ${{ matrix.workspace }}
        env:
          DATABASE_URL: postgresql://postgres:dummy_password@localhost:5432/portfolio_test?schema=public

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.workspace }}

      - name: Bundle analysis (web only)
        if: matrix.workspace == 'apps/web'
        run: npm run analyze
        working-directory: apps/web
        env:
          ANALYZE: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.workspace == 'apps/api' && 'api' || 'web' }}
          path: apps/*/coverage/
          retention-days: 14

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run audit
        run: npm audit --audit-level=high

  prisma-validate:
    name: Prisma Schema Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dummy_password
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: apps/api
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:dummy_password@localhost:5432/portfolio_test?schema=public
      - name: Deploy migrations
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:dummy_password@localhost:5432/portfolio_test?schema=public

  docker-build:
    name: Docker Build (${{ matrix.app }})
    needs: [quality, prisma-validate, npm-audit]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
